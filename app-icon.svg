<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#181818"/>
    </linearGradient>
    <linearGradient id="dg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00BCD4"/>
      <stop offset="50%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </linearGradient>
  </defs>
  <!-- 圆角底板 -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)" stroke="#333" stroke-width="4"/>
  <!-- 字母 D 使用 evenodd 填充规则使内孔镂空 -->
  <path fill-rule="evenodd" d="
    M 140 120 H 280 Q 390 120 390 256 Q 390 392 280 392 H 140 Z
    M 210 200 H 260 Q 310 200 310 256 Q 310 312 260 312 H 210 Z
  " fill="url(#dg)"/>
</svg>
